version: "3.9"

services:
  db:
    image: postgres:15
    container_name: metaflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: metaflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: ./app
    container_name: metaflow-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_NAME: metaflow
      DB_USER: postgres
      DB_PASSWORD: postgres

volumes:
  pgdata:
